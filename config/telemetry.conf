# QENEX LAB Telemetry Configuration
# Real-time monitoring of laboratory systems

[core_resources]
total_ram_gb=62
cpu_features=AVX-512
target_cpu_load_percent=75

[trinity_pipeline]
theorist_model=llama-scout-17b
coder_model=deepseek-coder-6.7b
validator_cli=/opt/qenex/scout-cli/target/release/scout
confidence_threshold=0.99

[expert_system]
total_experts=18
expert_domains=physics,mathematics,quantum,relativity,cosmology,thermodynamics,electromagnetism,nuclear,particle,astrophysics,materials,computation,information,statistics,algebra,geometry,topology,analysis

[lab_stability]
phi_threshold=0.95
auto_validation=true
lagrangian_gate=enabled

[output_engine]
pdf_engine=/opt/qenex_lab/bin/publish-paper
latex_compiler=pdflatex
output_dir=/opt/qenex_lab/publications
