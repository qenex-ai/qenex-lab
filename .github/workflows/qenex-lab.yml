name: qenex-lab

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  qenex-lab:
    if: |
      contains(github.event.comment.body, ' /ql') ||
      startsWith(github.event.comment.body, '/ql') ||
      contains(github.event.comment.body, ' /qenex') ||
      startsWith(github.event.comment.body, '/qenex')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-bun

      - name: Run QENEX LAB
        uses: abdulrahman305/qenex-lab/github@latest
        env:
          QENEX_API_KEY: ${{ secrets.QENEX_API_KEY }}
          QENEX_PERMISSION: '{"bash": "deny"}'
        with:
          model: anthropic/claude-sonnet-4-20250514
